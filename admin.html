<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Reuniões Semanais</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <h2>Área restrita</h2>
      <p>Acesso apenas para organizadores</p>
      <div class="login-field">
        <label for="pw-input">Password</label>
        <input type="password" id="pw-input" placeholder="••••••••">
      </div>
      <button class="login-btn" type="button" onclick="doLogin()">Entrar</button>
      <div class="login-error" id="login-error">Password incorreta. Tenta novamente.</div>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="admin-screen">

    <div class="topbar">
      <div class="topbar-title">Reuniões semanais</div>
      <span class="topbar-badge" id="total-badge">— inscritos</span>
      <button class="icon-btn" type="button" onclick="loadData()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Atualizar
      </button>
      <button class="icon-btn" type="button" onclick="exportCSV()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Exportar CSV
      </button>
      <button class="logout-btn" type="button" onclick="logout()">Sair</button>
    </div>

    <div class="content">
      <div id="rooms-container"></div>
      <div class="refresh-hint">Clica em "Atualizar" para ver novas inscrições</div>
    </div>

  </div>

  <script src="Admin.js"></script>
</body>
</html>
